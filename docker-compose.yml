# HR Tool — one-command local stack.
#   db      : PostgreSQL (the only DB the app runs on unchanged)
#   mailpit : catches all outgoing email so "Add Employee" etc. never error
#   app     : the Laravel app, served on http://localhost:8000
#
# Start everything with:   docker compose up --build
# (or just double-click start.bat on Windows)
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: employees_management
      POSTGRES_USER: hr
      POSTGRES_PASSWORD: hr
    volumes:
      - hrtool_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hr -d employees_management"]
      interval: 5s
      timeout: 3s
      retries: 20
    # No host port published, so an existing local Postgres on 5432 can't clash.

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"   # open http://localhost:8025 to read "sent" emails
    # SMTP (1025) is reached internally by the app over the Docker network.

  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - docker/app.env
    depends_on:
      db:
        condition: service_healthy
      mailpit:
        condition: service_started
    ports:
      - "8000:8000"

volumes:
  hrtool_pgdata:
